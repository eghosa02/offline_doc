name: Genera JSON documenti

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  genera:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Genera documenti.json e verbali.json
        run: |
          python3 - <<'EOF'
          import os, json

          # Cartelle da escludere
          ESCLUSE = {".github", "verbali"}

          # documenti.json — una voce per cartella con PDF dentro
          documenti = []
          for cartella in sorted(os.listdir(".")):
              if not os.path.isdir(cartella):
                  continue
              if cartella in ESCLUSE or cartella.startswith("."):
                  continue
              pdf = os.path.join(cartella, cartella + ".pdf")
              if os.path.exists(pdf):
                  nome = cartella.replace("_", " ").title()
                  documenti.append({
                      "nome": nome,
                      "cartella": cartella,
                      "file": pdf
                  })

          with open("documenti.json", "w") as out:
              json.dump(documenti, out, indent=2, ensure_ascii=False)
          print(f"Generati {len(documenti)} documenti.")

          # verbali.json — come prima
          verbali = []
          for f in sorted(os.listdir("verbali")):
              if f.endswith(".pdf"):
                  nome = f.replace(".pdf", "").replace("_", " ").title()
                  verbali.append({"nome": nome, "file": f})

          with open("verbali/verbali.json", "w") as out:
              json.dump(verbali, out, indent=2, ensure_ascii=False)
          print(f"Generati {len(verbali)} verbali.")
          EOF

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add documenti.json verbali/verbali.json
          git diff --staged --quiet || git commit -m "chore: aggiorna documenti.json e verbali.json"
          git pull --rebase
          git push