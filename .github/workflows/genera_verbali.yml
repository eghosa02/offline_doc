name: Genera verbali.json

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  genera:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Genera verbali.json
        run: |
          python3 - <<'EOF'
          import os, json

          verbali = []
          for f in sorted(os.listdir("verbali")):
              if f.endswith(".pdf"):
                  nome = f.replace(".pdf", "").replace("_", " ").title()
                  verbali.append({"nome": nome, "file": f})

          with open("verbali/verbali.json", "w") as out:
              json.dump(verbali, out, indent=2, ensure_ascii=False)

          print(f"Generati {len(verbali)} verbali.")
          EOF

      - name: Commit e push verbali.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add verbali/verbali.json
          git diff --staged --quiet || git commit -m "chore: aggiorna verbali.json"
          git push