<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiroFish Trading – Documentazione</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-top">
        <div class="dot"></div>
        <h1>MiroFish Trading — Documentazione</h1>
      </div>
      <p class="subtitle">Documenti tecnici del progetto</p>
    </div>

    <div class="footer">mirofish trading · documentazione interna</div>
  </div>

  <script>
    const container = document.querySelector('.container');
    const footer = document.querySelector('.footer');

    // Carica documenti generici
    fetch('documenti.json')
      .then(r => r.json())
      .then(docs => {
        docs.forEach(doc => {
          const section = document.createElement('div');
          section.className = 'section';
          section.innerHTML = `
            <div class="section-title">${doc.nome}</div>
            <div class="pdf-list">
              <a class="pdf-item" href="view.html?doc=${doc.file}">
                <div class="pdf-icon-box"><span>PDF</span></div>
                <div class="pdf-info">
                  <div class="pdf-name">${doc.nome}</div>
                  <div class="pdf-path">${doc.file}</div>
                </div>
                <span class="arrow">↗</span>
              </a>
            </div>`;
          container.insertBefore(section, footer);
        });
      });

    // Carica verbali
    fetch('verbali/verbali.json')
      .then(r => r.json())
      .then(verbali => {
        const section = document.createElement('div');
        section.className = 'section';
        section.innerHTML = `
          <div class="section-title">Verbali</div>
          <div class="pdf-list" id="verbali-list"></div>`;
        container.insertBefore(section, footer);

        const list = document.getElementById('verbali-list');
        verbali.forEach(v => {
          list.innerHTML += `
            <a class="pdf-item" href="view.html?doc=verbali/${v.file}">
              <div class="pdf-icon-box"><span>PDF</span></div>
              <div class="pdf-info">
                <div class="pdf-name">${v.nome}</div>
                <div class="pdf-path">verbali/${v.file}</div>
              </div>
              <span class="arrow">↗</span>
            </a>`;
        });
      });
  </script>
</body>
</html>
