<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Visualizzatore</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
    .topbar { padding: 0.75rem 1.5rem; border-bottom: 1px solid #e8e8e8; }
    iframe { flex: 1; width: 100%; border: none; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html">← Torna all'indice</a>
  </div>
  <iframe id="viewer"></iframe>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('viewer').src = params.get('doc');
  </script>
</body>
</html>
